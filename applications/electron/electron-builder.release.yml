# ARC Studio Electron release packaging configuration.
# Signing credentials are required. Use electron-builder.smoke.yml for local smoke builds.

appId: "ai.arc-studio.desktop"
productName: "ARC Studio"
copyright: "Copyright 2025 ARC Studio Contributors"

forceCodeSigning: true

directories:
  output: dist
  buildResources: resources

files:
  - "src-gen/**/*"
  - "node_modules/**/*"
  - "package.json"

extraResources:
  - from: "../../python"
    to: "arc-python"
    filter:
      - "src/**/*"
      - "pyproject.toml"
      - "README.md"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.venv/**"
      - "!**/.pytest_cache/**"
      - "!**/.ruff_cache/**"
      - "!**/.mypy_cache/**"
      - "!**/*.egg-info/**"
      - "!**/tests/**"
      - "!**/.env"
      - "!**/.env.*"
      - "!**/.arc/**"
      - "!**/dist/**"
      - "!**/build/**"

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: "public.app-category.developer-tools"
  icon: "resources/icons/icon.icns"

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: "Development"
  icon: "resources/icons"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: "resources/icons/icon.ico"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: "resources/icons/icon.ico"
  installerHeaderIcon: "resources/icons/icon.ico"
  createDesktopShortcut: true
  createStartMenuShortcut: true
