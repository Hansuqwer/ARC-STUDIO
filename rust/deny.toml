# cargo-deny configuration for the arc-v2 Rust workspace (Sprint-12 §3.15).
# Run: cd rust && cargo deny check
# CI wiring: arc-v2-rust.yml gains a deny step when cargo-deny is in the
# runner cache (tracked; tool pinned at adoption per the review's D3 rule:
# exact tools cargo-deny + cargo-audit, not "audit-style checks").

[advisories]
version = 2
yanked = "deny"
# vulnerability/unmaintained default to "deny"/"warn" under version 2 policy.

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "MPL-2.0",        # webpki roots etc.; weak copyleft, file-scoped
  "CDLA-Permissive-2.0", # webpki-roots data files
  "CC0-1.0",        # notify (public-domain-equivalent; FSF Free)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"        # no wildcard VERSION deps in OUR crates
allow-wildcard-paths = true  # path-only deps inside this private workspace are fine
# Framework crates must never appear in the MAIN workspace graph
# (facade rule, mechanically enforced here as well as in CI grep):
deny = [
  { crate = "gpui" },
  { crate = "floem" },
  { crate = "masonry" },
  { crate = "xilem" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
