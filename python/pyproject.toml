[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-runtime-cockpit"
version = "0.1.0a0"
description = "ARC — Agent Runtime Cockpit: Python daemon, adapters, context retrieval"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [{ name = "ARC Studio Contributors" }]
keywords = ["agent", "runtime", "ide", "theia", "swarmgraph", "langgraph"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "pydantic>=2.7",
    "typer>=0.12",
    "rich>=13.7",
    "aiohttp>=3.9",
    "aiofiles>=23.2",
]

[project.optional-dependencies]
swarmgraph = []
langgraph = ["langgraph>=0.2"]
context = ["httpx>=0.27"]
all = ["agent-runtime-cockpit[langgraph,context]"]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
arc = "agent_runtime_cockpit.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_runtime_cockpit"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
