name: swarmgraph-sdk-release

# Builds, verifies, and (only when explicitly approved) publishes the standalone
# swarmgraph-sdk wheel.
#
# Publishing is HARD-GATED and never happens automatically:
#   1. The `publish` input must be set to "true" via workflow_dispatch.
#   2. The publish job runs in the protected `pypi` GitHub Environment, which a
#      maintainer must create with required reviewers / manual approval.
#   3. Publishing uses PyPI Trusted Publishers (OIDC) via `id-token: write`; no
#      long-lived token is stored. The trusted publisher must be configured on
#      PyPI for this repo + workflow + environment before it can succeed.
#
# Until all three are in place, the default path is `publish-dry-run`
# (`twine check` only). Tag pushes and normal dispatch never publish.

on:
  push:
    tags:
      - "swarmgraph-sdk-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        required: false
        default: ""
      publish:
        description: "Set to 'true' to publish to PyPI (requires approval)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: astral-sh/setup-uv@v5
      - name: Build SDK wheel + sdist
        working-directory: python
        # In a uv workspace, `uv build <member>` writes to the workspace root
        # dist/ (python/dist). Build into an isolated output dir to scope it.
        run: uv build packages/swarmgraph-sdk --out-dir packages/swarmgraph-sdk/dist
      - name: Verify isolated import + CLI
        working-directory: python
        run: |
          WHL=$(ls packages/swarmgraph-sdk/dist/*.whl)
          uv run --isolated --with "$WHL" python -c "import swarmgraph; print(swarmgraph.SwarmGraphRunner)"
          uv run --isolated --with "$WHL" swarmgraph run "Explain consensus" --json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swarmgraph-sdk-dist
          path: python/packages/swarmgraph-sdk/dist/*

  publish-dry-run:
    needs: build
    # Runs whenever we are NOT explicitly publishing. This is the default.
    if: ${{ github.event.inputs.publish != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: swarmgraph-sdk-dist
          path: dist
      - name: Twine check (dry-run only, no upload)
        run: |
          uvx twine check dist/*
          echo "Dry-run complete. Publishing is intentionally disabled (publish != true)."

  publish:
    needs: build
    # Hard gate: only on an explicit workflow_dispatch with publish=true.
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Protected environment provides the manual-approval gate. A maintainer must
    # create the `pypi` environment with required reviewers before this can run.
    environment:
      name: pypi
      url: https://pypi.org/project/swarmgraph-sdk/
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishers; no token secret.
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: swarmgraph-sdk-dist
          path: dist
      - name: Twine check before publish
        run: uvx twine check dist/*
      - name: Publish to PyPI (Trusted Publisher OIDC)
        run: uv publish dist/*
