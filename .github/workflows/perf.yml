name: perf (informational)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  measure:
    runs-on: ubuntu-latest
    continue-on-error: true   # informational only — flip to false after 2-week baseline
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: astral-sh/setup-uv@v3
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project python
      - run: node scripts/measure-perf.mjs build  | tee -a perf-history.jsonl
      - run: node scripts/measure-perf.mjs pytest | tee -a perf-history.jsonl
      - uses: actions/upload-artifact@v4
        with: { name: perf-history, path: perf-history.jsonl }
