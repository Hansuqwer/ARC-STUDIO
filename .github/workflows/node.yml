name: node

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --max-old-space-size=8192   # workaround for known CI issue #19
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential pkg-config libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Bootstrap tests
        run: |
          node tests/unit/arc-protocol.test.js
          node packages/arc-test-fixtures/src/index.js

      - name: Build arc-protocol-ts
        run: pnpm --filter @arc-studio/protocol build

      - name: Test arc-protocol-ts
        run: pnpm --filter @arc-studio/protocol test -- --ci

      - name: Build arc-extension
        run: pnpm --filter arc-extension build

      - name: Build all packages
        run: pnpm -r build

      - name: Workspace tests
        run: pnpm -r --filter '!@arc-studio/e2e-tests' test

      - name: check:pr
        run: pnpm check:pr
