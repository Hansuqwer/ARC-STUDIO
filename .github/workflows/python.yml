name: python

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        working-directory: python
        run: uv sync --all-extras --dev
      - name: Ruff
        working-directory: python
        run: uv run ruff check src tests
      - name: Mypy (scoped)
        working-directory: python
        run: uv run mypy src/agent_runtime_cockpit/ag_ui/ src/agent_runtime_cockpit/gating.py src/agent_runtime_cockpit/security/ src/agent_runtime_cockpit/protocol/ src/agent_runtime_cockpit/workspace.py
      - name: Dependency audit (Python)
        working-directory: python
        run: |
          SITE_PACKAGES=$(uv run python -c "import site; print(site.getsitepackages()[0])")
          uv run pip-audit --skip-editable --path "$SITE_PACKAGES" --progress-spinner off
      - name: Artifact guard
        run: bash scripts/check-artifacts.sh
      - name: Tests (strict warnings)
        working-directory: python
        run: uv run pytest -q -W error -W ignore::ResourceWarning -W ignore::pytest.PytestUnraisableExceptionWarning -W ignore::DeprecationWarning
      - name: CLI smoke
        working-directory: python
        run: |
          .venv/bin/arc --help
          .venv/bin/arc inspect --json
          .venv/bin/arc adapter test swarmgraph --json
          .venv/bin/arc adapter test langgraph --json
