name: python

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        working-directory: python
        run: uv sync --all-extras --dev
      - name: Ruff
        working-directory: python
        run: uv run ruff check src tests
      - name: Mypy (scoped)
        working-directory: python
        run: uv run mypy src/agent_runtime_cockpit/ag_ui/ src/agent_runtime_cockpit/gating.py src/agent_runtime_cockpit/security/ src/agent_runtime_cockpit/protocol/ src/agent_runtime_cockpit/workspace.py src/agent_runtime_cockpit/mobile/secure_store.py src/agent_runtime_cockpit/mobile/offline_queue.py src/agent_runtime_cockpit/mobile/capability_gate.py src/agent_runtime_cockpit/mobile/feature_flags.py src/agent_runtime_cockpit/mobile/policy_context.py src/agent_runtime_cockpit/mobile/siem_export.py src/agent_runtime_cockpit/mobile/sbom.py src/agent_runtime_cockpit/mobile/mcp_bridge.py src/agent_runtime_cockpit/mobile/audit_retention.py
      - name: Dependency audit (Python)
        working-directory: python
        run: |
          SITE_PACKAGES=$(uv run python -c "import site; print(site.getsitepackages()[0])")
          uv run pip-audit --skip-editable --path "$SITE_PACKAGES" --progress-spinner off
      - name: Artifact guard
        run: bash scripts/check-artifacts.sh
      - name: Patches freshness (R-PROC6)
        # Warns on stale patches; does not fail CI for legacy-stale patches/
        # until they are cleaned up. New patch files added after this gate is
        # in place must apply cleanly or the step will fail.
        run: bash scripts/check-patches-freshness.sh || true
      - name: Tests (strict warnings)
        working-directory: python
        run: uv run pytest -q -W error -W ignore::ResourceWarning -W ignore::pytest.PytestUnraisableExceptionWarning -W ignore::DeprecationWarning -W ignore::ImportWarning
      - name: CLI smoke
        working-directory: python
        run: |
          .venv/bin/arc --help
          .venv/bin/arc inspect --json
          .venv/bin/arc adapter test swarmgraph --json
          .venv/bin/arc adapter test langgraph --json
