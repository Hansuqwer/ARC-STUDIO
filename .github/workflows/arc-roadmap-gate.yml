name: ARC Roadmap Gate
on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - uses: astral-sh/setup-uv@v5

      - name: Native build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint --if-present

      - name: TypeScript type-check
        run: pnpm typecheck

      - name: AG-UI unit tests
        run: (cd packages/arc-ag-ui && pnpm test)

      - name: Protocol fixture tests
        run: |
          node tests/unit/arc-protocol.test.js
          node packages/arc-test-fixtures/src/index.js

      - name: Python sync dependencies
        working-directory: python
        run: uv sync --all-extras --dev

      - name: Python lint
        working-directory: python
        run: uv run ruff check src tests

      - name: Python type check (scoped)
        working-directory: python
        run: uv run mypy src/agent_runtime_cockpit/ag_ui/ src/agent_runtime_cockpit/gating.py src/agent_runtime_cockpit/security/ src/agent_runtime_cockpit/protocol/ src/agent_runtime_cockpit/workspace.py

      - name: Python tests with coverage
        working-directory: python
        run: |
          uv run pytest --cov=agent_runtime_cockpit \
                        --cov-report=xml \
                        --cov-fail-under=60

      - name: PR hygiene
        run: pnpm check:pr

      - name: No-live-provider regression
        env:
          ARC_SWARMGRAPH_RUN_BACKEND: ''
          ARC_SWARMGRAPH_ALLOW_COSTS: ''
        run: |
          node -e "
            const banned = ['ARC_SWARMGRAPH_RUN_BACKEND','ARC_SWARMGRAPH_ALLOW_COSTS'];
            for (const k of banned) if (process.env[k]) { console.error('Gate violated:', k); process.exit(1); }
          "
