  <rect x="40" y="120" width="160" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="60" y="145" fill="#e0af68" font-family="monospace" font-size="14">👤 Agent</text>
  <rect x="40" y="170" width="160" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="60" y="195" fill="#7dcfff" font-family="monospace" font-size="14">🔧 Tool</text>
  <rect x="40" y="220" width="160" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="60" y="245" fill="#73daca" font-family="monospace" font-size="14">❓ Condition</text>
  <rect x="40" y="270" width="160" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="60" y="295" fill="#bb9af7" font-family="monospace" font-size="14">🔄 Loop</text>
  <rect x="40" y="320" width="160" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="60" y="345" fill="#f7768e" font-family="monospace" font-size="14">🤝 Consensus</text>

  <!-- Center: Canvas -->
  <rect x="240" y="70" width="1100" height="980" rx="8" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>

  <!-- Grid dots -->
  <g opacity="0.2">
    <circle cx="300" cy="150" r="1" fill="#3b4261"/><circle cx="340" cy="150" r="1" fill="#3b4261"/><circle cx="380" cy="150" r="1" fill="#3b4261"/><circle cx="420" cy="150" r="1" fill="#3b4261"/>
    <circle cx="300" cy="190" r="1" fill="#3b4261"/><circle cx="340" cy="190" r="1" fill="#3b4261"/><circle cx="380" cy="190" r="1" fill="#3b4261"/><circle cx="420" cy="190" r="1" fill="#3b4261"/>
  </g>

  <!-- Edges (handoff + parallel) -->
  <path d="M 790 300 L 590 450" stroke="#7dcfff" stroke-width="2" fill="none" filter="url(#glow)"/>
  <text x="640" y="370" fill="#7dcfff" font-family="monospace" font-size="10">handoff</text>
  <path d="M 790 300 L 990 450" stroke="#7dcfff" stroke-width="2" fill="none" filter="url(#glow)"/>
  <text x="840" y="370" fill="#7dcfff" font-family="monospace" font-size="10">parallel</text>
  <path d="M 790 300 L 590 650" stroke="#7dcfff" stroke-width="2" fill="none" filter="url(#glow)"/>
  <text x="640" y="470" fill="#7dcfff" font-family="monospace" font-size="10">parallel</text>
  <path d="M 790 300 L 990 650" stroke="#7dcfff" stroke-width="2" fill="none" filter="url(#glow)"/>
  <text x="840" y="470" fill="#7dcfff" font-family="monospace" font-size="10">parallel</text>
  <path d="M 590 520 L 790 650" stroke="#e0af68" stroke-width="2" fill="none" filter="url(#glow)"/>
  <text x="640" y="590" fill="#e0af68" font-family="monospace" font-size="10">consensus</text>
  <path d="M 990 520 L 790 650" stroke="#e0af68" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 790 520 L 790 650" stroke="#e0af68" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 590 520 L 990 520" stroke="#e0af68" stroke-width="2" fill="none" filter="url(#glow)" stroke-dasharray="4 2"/>

  <!-- Queen Node (hexagon) -->
  <polygon points="790,260 830,285 830,315 790,340 750,315 750,285" fill="#e0af68" opacity="0.2" stroke="#e0af68" stroke-width="2" filter="url(#glow)"/>
  <text x="790" y="300" fill="#e0af68" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">Queen</text>
  <text x="790" y="315" fill="#e0af68" font-family="monospace" font-size="10" text-anchor="middle">Coordinator</text>

  <!-- Researcher Node -->
  <rect x="510" y="450" width="160" height="80" rx="8" fill="#7aa2f7" opacity="0.2" stroke="#7aa2f7" stroke-width="2" filter="url(#glow)"/>
  <text x="590" y="480" fill="#7aa2f7" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">Researcher</text>
  <text x="590" y="500" fill="#7aa2f7" font-family="monospace" font-size="10" text-anchor="middle">Claude Haiku 4.5</text>
  <text x="590" y="515" fill="#7aa2f7" font-family="monospace" font-size="10" text-anchor="middle">Model: fast</text>

  <!-- Coder Node -->
  <rect x="910" y="450" width="160" height="80" rx="8" fill="#73daca" opacity="0.2" stroke="#73daca" stroke-width="2" filter="url(#glow)"/>
  <text x="990" y="480" fill="#73daca" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">Coder</text>
  <text x="990" y="500" fill="#73daca" font-family="monospace" font-size="10" text-anchor="middle">Claude Sonnet 4.6</text>
  <text x="990" y="515" fill="#73daca" font-family="monospace" font-size="10" text-anchor="middle">Model: balanced</text>

  <!-- Reviewer Node -->
  <rect x="510" y="650" width="160" height="80" rx="8" fill="#bb9af7" opacity="0.2" stroke="#bb9af7" stroke-width="2" filter="url(#glow)"/>
  <text x="590" y="680" fill="#bb9af7" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">Reviewer</text>
  <text x="590" y="700" fill="#bb9af7" font-family="monospace" font-size="10" text-anchor="middle">GPT-5.3</text>
  <text x="590" y="715" fill="#bb9af7" font-family="monospace" font-size="10" text-anchor="middle">Model: reasoning</text>

  <!-- Tester Node -->
  <rect x="910" y="650" width="160" height="80" rx="8" fill="#e0af68" opacity="0.2" stroke="#e0af68" stroke-width="2" filter="url(#glow)"/>
  <text x="990" y="680" fill="#e0af68" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">Tester</text>
  <text x="990" y="700" fill="#e0af68" font-family="monospace" font-size="10" text-anchor="middle">DeepSeek V3</text>
  <text x="990" y="715" fill="#e0af68" font-family="monospace" font-size="10" text-anchor="middle">Model: cheap</text>

