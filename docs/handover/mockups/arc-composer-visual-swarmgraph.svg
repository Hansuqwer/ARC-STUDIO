  <text x="790" y="715" fill="#f7768e" font-family="monospace" font-size="10" text-anchor="middle">Threshold: 75%</text>

  <!-- Right: Properties Panel -->
  <rect x="1360" y="70" width="540" height="500" rx="8" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>
