  <text x="1390" y="310" fill="#c0caf5" font-family="monospace" font-size="12">off to Researcher, Coder, Reviewer, and</text>
  <text x="1390" y="330" fill="#c0caf5" font-family="monospace" font-size="12">Tester in parallel. Gather consensus.</text>

  <text x="1380" y="375" fill="#7aa2f7" font-family="monospace" font-size="14">Tools</text>
  <rect x="1380" y="390" width="20" height="20" rx="4" fill="#73daca" opacity="0.3"/>
  <text x="1410" y="405" fill="#c0caf5" font-family="monospace" font-size="12">☑ arc_swarmgraph_plan</text>
  <rect x="1380" y="420" width="20" height="20" rx="4" fill="#73daca" opacity="0.3"/>
  <text x="1410" y="435" fill="#c0caf5" font-family="monospace" font-size="12">☑ arc_swarmgraph_assess_risk</text>
  <rect x="1380" y="450" width="20" height="20" rx="4" fill="#73daca" opacity="0.3"/>
  <text x="1410" y="465" fill="#c0caf5" font-family="monospace" font-size="12">☑ arc_swarmgraph_consensus</text>

  <text x="1380" y="505" fill="#7aa2f7" font-family="monospace" font-size="14">Max Iterations</text>
  <rect x="1380" y="520" width="100" height="30" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1390" y="540" fill="#c0caf5" font-family="monospace" font-size="14">5</text>

  <!-- Bottom: Simulation + Code -->
