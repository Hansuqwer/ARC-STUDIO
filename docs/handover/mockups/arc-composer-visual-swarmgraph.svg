<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1b26"/><stop offset="100%" stop-color="#16161e"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1920" height="50" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>
  <text x="30" y="33" fill="#7dcfff" font-family="monospace" font-size="20" font-weight="bold">ARC Composer</text>
  <text x="200" y="33" fill="#565f89" font-family="monospace" font-size="14">Visual SwarmGraph Builder</text>
  <rect x="1500" y="12" width="80" height="28" rx="6" fill="#73daca" opacity="0.2" stroke="#73daca" stroke-width="1"/>
  <text x="1520" y="31" fill="#73daca" font-family="monospace" font-size="12">Validate</text>
  <rect x="1600" y="12" width="80" height="28" rx="6" fill="#7dcfff" opacity="0.2" stroke="#7dcfff" stroke-width="1"/>
  <text x="1620" y="31" fill="#7dcfff" font-family="monospace" font-size="12">Export</text>
  <rect x="1700" y="12" width="80" height="28" rx="6" fill="#bb9af7" opacity="0.2" stroke="#bb9af7" stroke-width="1"/>
  <text x="1720" y="31" fill="#bb9af7" font-family="monospace" font-size="12">Run</text>
  <text x="1800" y="31" fill="#7aa2f7" font-family="monospace" font-size="14">Zoom: 100%</text>

