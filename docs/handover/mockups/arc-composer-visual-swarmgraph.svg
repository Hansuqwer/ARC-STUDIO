  <text x="1380" y="620" fill="#c0caf5" font-family="monospace" font-size="16" font-weight="bold">Simulation</text>
  <rect x="1380" y="635" width="500" height="200" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1390" y="660" fill="#73daca" font-family="monospace" font-size="12">[14:32:01] Queen: Task received — "Build auth refactor"</text>
  <text x="1390" y="680" fill="#7dcfff" font-family="monospace" font-size="12">[14:32:02] Queen → Researcher (handoff)</text>
  <text x="1390" y="700" fill="#7dcfff" font-family="monospace" font-size="12">[14:32:02] Queen → Coder (parallel)</text>
  <text x="1390" y="720" fill="#7dcfff" font-family="monospace" font-size="12">[14:32:02] Queen → Reviewer (parallel)</text>
  <text x="1390" y="740" fill="#7dcfff" font-family="monospace" font-size="12">[14:32:02] Queen → Tester (parallel)</text>
  <text x="1390" y="760" fill="#73daca" font-family="monospace" font-size="12">[14:32:05] Researcher: Context gathered</text>
  <text x="1390" y="780" fill="#73daca" font-family="monospace" font-size="12">[14:32:08] Coder: 4 files modified</text>
  <text x="1390" y="800" fill="#e0af68" font-family="monospace" font-size="12">[14:32:10] Consensus: 87% agreement</text>

  <text x="1380" y="855" fill="#c0caf5" font-family="monospace" font-size="14" font-weight="bold">Generated Code</text>
  <rect x="1380" y="870" width="500" height="160" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1390" y="895" fill="#7aa2f7" font-family="monospace" font-size="12">from agent_runtime_cockpit.swarmgraph import Queen, Worker</text>
  <text x="1390" y="915" fill="#7dcfff" font-family="monospace" font-size="12">queen = Queen(model="claude-sonnet-4.6", ...)</text>
  <text x="1390" y="935" fill="#c0caf5" font-family="monospace" font-size="12">workers = [</text>
  <text x="1390" y="955" fill="#c0caf5" font-family="monospace" font-size="12">  Worker("researcher", model="claude-haiku-4.5"),</text>
  <text x="1390" y="975" fill="#c0caf5" font-family="monospace" font-size="12">  Worker("coder", model="claude-sonnet-4.6"), ...</text>
  <text x="1390" y="995" fill="#c0caf5" font-family="monospace" font-size="12">]</text>
  <text x="1390" y="1015" fill="#7dcfff" font-family="monospace" font-size="12">result = queen.orchestrate(workers, task="Build auth refactor")</text>
</svg>
