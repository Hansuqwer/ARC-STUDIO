<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1b26"/><stop offset="100%" stop-color="#16161e"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1920" height="50" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>
  <text x="30" y="33" fill="#7dcfff" font-family="monospace" font-size="20" font-weight="bold">ARC Time Travel</text>
  <text x="220" y="33" fill="#565f89" font-family="monospace" font-size="14">Run Replay & Debugger — Run #a7f5ff7</text>
  <text x="1600" y="33" fill="#bb9af7" font-family="monospace" font-size="14">Step 42 / 156</text>

  <!-- Timeline -->
  <rect x="30" y="70" width="1860" height="100" rx="8" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>
  <line x1="50" y1="120" x2="1870" y2="120" stroke="#3b4261" stroke-width="2"/>

  <!-- Timeline events -->
  <circle cx="80" cy="120" r="8" fill="#73daca" stroke="#73daca" stroke-width="2" filter="url(#glow)"/>
  <text x="80" y="145" fill="#73daca" font-family="monospace" font-size="10" text-anchor="middle">INIT</text>

  <circle cx="180" cy="120" r="8" fill="#7dcfff" stroke="#7dcfff" stroke-width="2" filter="url(#glow)"/>
  <text x="180" y="145" fill="#7dcfff" font-family="monospace" font-size="10" text-anchor="middle">LLM</text>

  <circle cx="280" cy="120" r="8" fill="#7dcfff" stroke="#7dcfff" stroke-width="2" filter="url(#glow)"/>
  <text x="280" y="145" fill="#7dcfff" font-family="monospace" font-size="10" text-anchor="middle">LLM</text>

  <circle cx="380" cy="120" r="8" fill="#e0af68" stroke="#e0af68" stroke-width="2" filter="url(#glow)"/>
  <text x="380" y="145" fill="#e0af68" font-family="monospace" font-size="10" text-anchor="middle">TOOL</text>

  <circle cx="480" cy="120" r="8" fill="#e0af68" stroke="#e0af68" stroke-width="2" filter="url(#glow)"/>
  <text x="480" y="145" fill="#e0af68" font-family="monospace" font-size="10" text-anchor="middle">TOOL</text>

  <circle cx="580" cy="120" r="8" fill="#f7768e" stroke="#f7768e" stroke-width="2" filter="url(#glow)"/>
  <text x="580" y="145" fill="#f7768e" font-family="monospace" font-size="10" text-anchor="middle">ERR</text>

  <circle cx="680" cy="120" r="8" fill="#7dcfff" stroke="#7dcfff" stroke-width="2" filter="url(#glow)"/>
  <text x="680" y="145" fill="#7dcfff" font-family="monospace" font-size="10" text-anchor="middle">LLM</text>

  <circle cx="780" cy="120" r="8" fill="#73daca" stroke="#73daca" stroke-width="2" filter="url(#glow)"/>
  <text x="780" y="145" fill="#73daca" font-family="monospace" font-size="10" text-anchor="middle">AUDIT</text>

  <!-- Current step (42) highlighted -->
  <circle cx="880" cy="120" r="12" fill="#bb9af7" stroke="#bb9af7" stroke-width="3" filter="url(#glow)"/>
  <text x="880" y="100" fill="#bb9af7" font-family="monospace" font-size="12" text-anchor="middle">STEP 42</text>
  <text x="880" y="145" fill="#bb9af7" font-family="monospace" font-size="10" text-anchor="middle">MCP</text>
  <line x1="880" y1="80" x2="880" y2="160" stroke="#bb9af7" stroke-width="2" stroke-dasharray="4 2"/>

  <circle cx="980" cy="120" r="8" fill="#7dcfff" stroke="#7dcfff" stroke-width="2" filter="url(#glow)"/>
  <text x="980" y="145" fill="#7dcfff" font-family="monospace" font-size="10" text-anchor="middle">LLM</text>

  <circle cx="1080" cy="120" r="8" fill="#e0af68" stroke="#e0af68" stroke-width="2" filter="url(#glow)"/>
  <text x="1080" y="145" fill="#e0af68" font-family="monospace" font-size="10" text-anchor="middle">TOOL</text>

  <circle cx="1180" cy="120" r="8" fill="#73daca" stroke="#73daca" stroke-width="2" filter="url(#glow)"/>
  <text x="1180" y="145" fill="#73daca" font-family="monospace" font-size="10" text-anchor="middle">END</text>

  <!-- Playhead slider -->
  <rect x="50" y="170" width="1820" height="6" rx="3" fill="#3b4261"/>
  <rect x="50" y="170" width="830" height="6" rx="3" fill="#bb9af7"/>
  <circle cx="880" cy="173" r="10" fill="#bb9af7" filter="url(#glow)"/>

  <!-- Left panel: Agent State -->
  <rect x="30" y="200" width="900" height="820" rx="8" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>
  <text x="50" y="230" fill="#7dcfff" font-family="monospace" font-size="16" font-weight="bold">Agent State at Step 42</text>
  <text x="50" y="260" fill="#565f89" font-family="monospace" font-size="12">Event: MCP_CALL_DECISION (arc_swarmgraph_assess_risk)</text>

  <!-- JSON tree -->
  <rect x="50" y="280" width="860" height="720" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="70" y="310" fill="#7aa2f7" font-family="monospace" font-size="14">{</text>
  <text x="90" y="335" fill="#7dcfff" font-family="monospace" font-size="14">"context"</text>
  <text x="170" y="335" fill="#c0caf5" font-family="monospace" font-size="14">: {</text>
  <text x="110" y="360" fill="#7dcfff" font-family="monospace" font-size="14">"workspace"</text>
  <text x="210" y="360" fill="#c0caf5" font-family="monospace" font-size="14">: "/home/user/proj",</text>
  <text x="110" y="385" fill="#7dcfff" font-family="monospace" font-size="14">"mode"</text>
  <text x="170" y="385" fill="#c0caf5" font-family="monospace" font-size="14">: "auto",</text>
  <text x="110" y="410" fill="#7dcfff" font-family="monospace" font-size="14">"budget"</text>
  <text x="180" y="410" fill="#c0caf5" font-family="monospace" font-size="14">: { "session": 4230, "limit": 50000 }</text>
  <text x="90" y="435" fill="#c0caf5" font-family="monospace" font-size="14">},</text>
  <text x="90" y="460" fill="#7dcfff" font-family="monospace" font-size="14">"messages"</text>
  <text x="170" y="460" fill="#c0caf5" font-family="monospace" font-size="14">: [ ... 12 messages ... ],</text>
  <text x="90" y="485" fill="#7dcfff" font-family="monospace" font-size="14">"tools"</text>
  <text x="150" y="485" fill="#c0caf5" font-family="monospace" font-size="14">: [ "arc_swarmgraph_assess_risk", "arc_swarmgraph_plan" ],</text>
  <text x="90" y="510" fill="#7dcfff" font-family="monospace" font-size="14">"mcp_decision"</text>
  <text x="210" y="510" fill="#c0caf5" font-family="monospace" font-size="14">: {</text>
  <text x="110" y="535" fill="#7dcfff" font-family="monospace" font-size="14">"risk_level"</text>
  <text x="200" y="535" fill="#e0af68" font-family="monospace" font-size="14">: "LOW",</text>
  <text x="110" y="560" fill="#7dcfff" font-family="monospace" font-size="14">"approved"</text>
  <text x="190" y="560" fill="#73daca" font-family="monospace" font-size="14">: true,</text>
  <text x="110" y="585" fill="#7dcfff" font-family="monospace" font-size="14">"audit_hash"</text>
  <text x="210" y="585" fill="#c0caf5" font-family="monospace" font-size="14">: "a3f7c9..."</text>
  <text x="90" y="610" fill="#c0caf5" font-family="monospace" font-size="14">}</text>
  <text x="90" y="635" fill="#c0caf5" font-family="monospace" font-size="14">}</text>
  <text x="70" y="660" fill="#7aa2f7" font-family="monospace" font-size="14">}</text>

  <!-- Right panel: Action Preview -->
  <rect x="960" y="200" width="930" height="400" rx="8" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>
  <text x="980" y="230" fill="#7dcfff" font-family="monospace" font-size="16" font-weight="bold">Action Preview</text>
  <text x="980" y="255" fill="#565f89" font-family="monospace" font-size="12">What happened vs. What would have happened if DENIED</text>

  <!-- Diff -->
  <rect x="980" y="275" width="890" height="300" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1000" y="300" fill="#73daca" font-family="monospace" font-size="14">+ Result (APPROVED):</text>
  <text x="1000" y="325" fill="#c0caf5" font-family="monospace" font-size="14">  Risk assessment completed. Tool call executed.</text>
  <text x="1000" y="350" fill="#c0caf5" font-family="monospace" font-size="14">  Output: {"risk": "low", "confidence": 0.94}</text>
  <text x="1000" y="380" fill="#f7768e" font-family="monospace" font-size="14">- Result (DENIED):</text>
  <text x="1000" y="405" fill="#c0caf5" font-family="monospace" font-size="14">  Tool call blocked. Sandbox decision logged.</text>
  <text x="1000" y="430" fill="#c0caf5" font-family="monospace" font-size="14">  Fallback: heuristic risk score applied.</text>
  <text x="1000" y="460" fill="#e0af68" font-family="monospace" font-size="14">Δ Impact: Run would have diverged at step 43.</text>
  <text x="1000" y="485" fill="#c0caf5" font-family="monospace" font-size="14">  Timeline difference: 3 steps vs. 8 steps to completion.</text>
  <text x="1000" y="510" fill="#c0caf5" font-family="monospace" font-size="14">  Token cost difference: +$0.12 vs. +$0.45</text>

  <!-- Branch button -->
  <rect x="980" y="560" width="200" height="40" rx="6" fill="#7dcfff" opacity="0.15" stroke="#7dcfff" stroke-width="1" filter="url(#glow)"/>
  <text x="1010" y="585" fill="#7dcfff" font-family="monospace" font-size="14">🌿 Branch from Here</text>

  <!-- Right panel: Controls -->
  <rect x="960" y="620" width="930" height="400" rx="8" fill="#1f2335" stroke="#3b4261" stroke-width="1"/>
  <text x="980" y="650" fill="#7dcfff" font-family="monospace" font-size="16" font-weight="bold">Playback Controls</text>

  <!-- VCR buttons -->
  <rect x="980" y="670" width="60" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1000" y="695" fill="#c0caf5" font-family="monospace" font-size="14">⏮</text>

  <rect x="1050" y="670" width="60" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1070" y="695" fill="#c0caf5" font-family="monospace" font-size="14">⏴</text>

  <rect x="1120" y="670" width="80" height="40" rx="6" fill="#bb9af7" opacity="0.2" stroke="#bb9af7" stroke-width="1"/>
  <text x="1145" y="695" fill="#bb9af7" font-family="monospace" font-size="14">⏵</text>

  <rect x="1210" y="670" width="60" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1230" y="695" fill="#c0caf5" font-family="monospace" font-size="14">⏵⏵</text>

  <rect x="1280" y="670" width="60" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1300" y="695" fill="#c0caf5" font-family="monospace" font-size="14">⏭</text>

  <rect x="980" y="730" width="200" height="40" rx="6" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1000" y="755" fill="#c0caf5" font-family="monospace" font-size="14">Compare Runs: Select...</text>

  <rect x="980" y="790" width="890" height="200" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
  <text x="1000" y="815" fill="#c0caf5" font-family="monospace" font-size="14">Branch Options:</text>
  <text x="1000" y="845" fill="#7dcfff" font-family="monospace" font-size="14">1. "Approve this MCP call" → Continue with approval</text>
  <text x="1000" y="875" fill="#7dcfff" font-family="monospace" font-size="14">2. "Deny this MCP call" → Block and use fallback</text>
  <text x="1000" y="905" fill="#7dcfff" font-family="monospace" font-size="14">3. "Modify arguments" → Edit args and re-evaluate</text>
  <text x="1000" y="935" fill="#7dcfff" font-family="monospace" font-size="14">4. "Switch provider" → Re-run with different model</text>
  <text x="1000" y="965" fill="#7dcfff" font-family="monospace" font-size="14">5. "Add HITL gate" → Insert human approval checkpoint</text>
</svg>
